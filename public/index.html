<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ubuntu VPS Panel</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.topbar {
    height: 58px;
    background: #050505;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
}

.logo {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: white;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.sidebar {
    position: fixed;
    top: 58px;
    left: 0;
    width: 260px;
    height: calc(100vh - 58px);
    background: #050505;
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 16px;
    overflow-y: auto;
    transition: 0.25s;
}

.sidebar.hidden {
    transform: translateX(-100%);
}

.file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    color: rgba(255,255,255,0.9);
}

.file-item:hover {
    background: rgba(255,255,255,0.08);
}

.main {
    margin-left: 260px;
    height: calc(100vh - 58px);
    transition: 0.25s;
}

.main.full {
    margin-left: 0;
}

.tabs {
    height: 52px;
    background: #050505;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    overflow-x: auto;
}

.tab {
    min-width: 160px;
    height: 38px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.03);
}

.tab.active {
    background: white;
    color: black;
}

.terminal-wrapper {
    position: relative;
    height: calc(100vh - 110px);
    background: black;
}

.terminal {
    position: absolute;
    inset: 0;
    padding: 10px;
    display: none;
}

.terminal.active {
    display: block;
}

.top-btn {
    height: 40px;
    padding: 0 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.top-btn:hover {
    background: white;
    color: black;
}

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
}
</style>
</head>
<body>

<div class="topbar">

    <div class="flex items-center gap-3">
        <div class="logo">V</div>

        <div>
            <h1 class="font-bold text-sm">VPS PANEL</h1>
            <p class="text-xs text-gray-400">Ubuntu Terminal System</p>
        </div>
    </div>

    <div class="flex items-center gap-2">

        <button onclick="toggleSidebar()" class="top-btn">
            <i class="fa-solid fa-folder"></i>
            Files
        </button>

        <button onclick="createTerminal()" class="top-btn">
            <i class="fa-solid fa-plus"></i>
            Terminal
        </button>

    </div>

</div>

<div id="sidebar" class="sidebar">

    <div class="flex items-center justify-between mb-5">
        <h2 class="font-bold text-lg">Files</h2>
        <i class="fa-solid fa-folder-tree"></i>
    </div>

    <div id="fileList" class="space-y-1"></div>

</div>

<div id="main" class="main">

    <div id="tabs" class="tabs"></div>

    <div id="terminalWrapper" class="terminal-wrapper"></div>

</div>

<script>
const socket = io();

let terminalCount = 0;
let terminals = {};

function createTerminal() {

    terminalCount++;

    const id = 'term-' + terminalCount;

    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.id = 'tab-' + id;

    tab.innerHTML = `
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-terminal"></i>
            <span>Terminal ${terminalCount}</span>
        </div>

        <i class="fa-solid fa-xmark cursor-pointer" onclick="removeTerminal(event, '${id}')"></i>
    `;

    tab.onclick = () => switchTerminal(id);

    document.getElementById('tabs').appendChild(tab);

    const termDiv = document.createElement('div');
    termDiv.className = 'terminal';
    termDiv.id = id;

    document.getElementById('terminalWrapper').appendChild(termDiv);

    const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        theme: {
            background: '#000000',
            foreground: '#ffffff'
        }
    });

    term.open(termDiv);

    term.write('Welcome to Ubuntu VPS\\r\\n');
    term.write('Connected to shell\\r\\n\\r\\n');

    term.onData((data) => {
        socket.emit('input', data);
    });

    terminals[id] = term;

    switchTerminal(id);
}

socket.on('output', (data) => {
    Object.values(terminals).forEach(term => {
        term.write(data);
    });
});

function switchTerminal(id) {

    document.querySelectorAll('.terminal').forEach(el => {
        el.classList.remove('active');
    });

    document.querySelectorAll('.tab').forEach(el => {
        el.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');

    terminals[id].focus();
}

function removeTerminal(event, id) {

    event.stopPropagation();

    document.getElementById(id)?.remove();
    document.getElementById('tab-' + id)?.remove();

    delete terminals[id];

    const first = document.querySelector('.terminal');

    if(first) {
        switchTerminal(first.id);
    }
}

function toggleSidebar() {

    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('main').classList.toggle('full');
}

async function loadFiles() {

    const res = await fetch('/files');
    const files = await res.json();

    const fileList = document.getElementById('fileList');

    fileList.innerHTML = '';

    files.forEach(file => {

        const div = document.createElement('div');

        div.className = 'file-item';

        let icon = 'fa-file';

        if(file.type === 'folder') {
            icon = 'fa-folder';
        }

        div.innerHTML = `
            <i class="fa-solid ${icon}"></i>
            <span>${file.name}</span>
        `;

        fileList.appendChild(div);
    });
}

createTerminal();
loadFiles();
</script>

</body>
</html>
