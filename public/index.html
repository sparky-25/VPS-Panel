<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MD.Cloud HOSTING VPS Panel</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}
.topbar {
    height: 58px;
    background: #050505;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
}
.logo {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: white;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}
.sidebar {
    position: fixed;
    top: 58px;
    left: 0;
    width: 280px;
    height: calc(100vh - 58px);
    background: #050505;
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 16px;
    overflow-y: auto;
    transition: 0.25s;
    z-index: 10;
}
.sidebar.hidden {
    transform: translateX(-100%);
}
.file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    background: rgba(255,255,255,0.02);
}
.file-item:hover {
    background: rgba(255,255,255,0.08);
}
.main {
    margin-left: 280px;
    height: calc(100vh - 58px);
    transition: 0.25s;
}
.main.full {
    margin-left: 0;
}
.tabs {
    height: 52px;
    background: #050505;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    overflow-x: auto;
}
.tab {
    min-width: 160px;
    height: 38px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.03);
}
.tab.active {
    background: white;
    color: black;
}
.terminal-wrapper {
    position: relative;
    height: calc(100vh - 110px);
    background: black;
    padding: 10px;
}
.terminal-container {
    width: 100%;
    height: 100%;
    display: none;
}
.terminal-container.active {
    display: block;
}
.top-btn {
    height: 40px;
    padding: 0 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
.top-btn:hover {
    background: white;
    color: black;
}
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    align-items: center;
    justify-content: center;
    z-index: 50;
}
.modal.active {
    display: flex;
}
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
}
</style>
</head>
<body>

<div class="topbar">
    <div class="flex items-center gap-3">
        <div class="logo">MD</div>
        <div>
            <h1 class="font-bold text-sm tracking-wide">MD.Cloud HOSTING VPS Panel</h1>
            <p class="text-xs text-gray-400">Secure Ubuntu Environment</p>
        </div>
    </div>

    <div class="flex items-center gap-2">
        <button onclick="toggleSidebar()" class="top-btn">
            <i class="fa-solid fa-folder mr-1"></i> Files
        </button>
        <button onclick="createTerminal()" class="top-btn">
            <i class="fa-solid fa-plus mr-1"></i> Terminal
        </button>
    </div>
</div>

<div id="sidebar" class="sidebar">
    <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-lg">Files</h2>
        <button onclick="promptCreateFile()" class="text-xs bg-zinc-800 px-3 py-1.5 rounded-lg hover:bg-white hover:text-black transition">
            <i class="fa-solid fa-file-circle-plus mr-1"></i> + New File
        </button>
    </div>
    <div id="fileList" class="space-y-2">
        <p class="text-xs text-gray-500 loading-text">Loading workspace files...</p>
    </div>
</div>

<div id="main" class="main">
    <div id="tabs" class="tabs"></div>
    <div id="terminalWrapper" class="terminal-wrapper"></div>
</div>

<div id="editModal" class="modal">
    <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl w-full max-w-2xl mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="font-bold text-lg text-white">Edit File</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <input type="hidden" id="editingFileName">
        <textarea id="fileEditor" class="w-full h-80 bg-black text-green-400 p-3 font-mono border border-zinc-800 rounded-lg focus:outline-none focus:border-zinc-600 resize-none"></textarea>
        <div class="flex justify-end gap-3 mt-4">
            <button onclick="closeModal()" class="px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 transition">Cancel</button>
            <button onclick="saveFileContent()" class="px-4 py-2 rounded-lg bg-white text-black font-semibold hover:bg-gray-200 transition">Save Changes</button>
        </div>
    </div>
</div>

<script>
// Backend Connection Initialize 
const socket = io();

let terminalCount = 0;
let terminals = {};
let currentTerminalId = null;

// Socket connection check karne ke liye logger
socket.on('connect', () => {
    console.log('Connected to MD.Cloud Backend Server');
});

// --- REAL TERMINAL SYSTEM ---
function createTerminal() {
    terminalCount++;
    const id = 'term-' + terminalCount;

    // Create Tab Component
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.id = 'tab-' + id;
    tab.innerHTML = `
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-terminal text-xs"></i>
            <span>Terminal ${terminalCount}</span>
        </div>
        <i class="fa-solid fa-xmark cursor-pointer text-xs hover:text-red-500" onclick="removeTerminal(event, '${id}')"></i>
    `;
    tab.onclick = () => switchTerminal(id);
    document.getElementById('tabs').appendChild(tab);

    // Create Terminal DOM Box
    const termDiv = document.createElement('div');
    termDiv.className = 'terminal-container';
    termDiv.id = id;
    document.getElementById('terminalWrapper').appendChild(termDiv);

    // Xterm Instance Rules
    const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: 'Courier New, monospace',
        theme: {
            background: '#000000',
            foreground: '#ffffff',
            cursor: '#ffffff'
        }
    });

    const fitAddon = new TerminalAddonFit.FitAddon();
    term.loadAddon(fitAddon);
    term.open(termDiv);
    fitAddon.fit();

    // Backend session handshake trigger
    socket.emit('create-session', id);

    // Key strokes forwarding to node-pty
    term.onData((data) => {
        socket.emit('terminal-input', { id, data });
    });

    terminals[id] = { term, fitAddon };
    switchTerminal(id);
}

// Global listen backend terminal responses
socket.on('terminal-output', (data) => {
    if (terminals[data.id]) {
        terminals[data.id].term.write(data.output);
    }
});

function switchTerminal(id) {
    currentTerminalId = id;
    document.querySelectorAll('.terminal-container').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

    if(document.getElementById(id)) {
        document.getElementById(id).classList.add('active');
        document.getElementById('tab-' + id).classList.add('active');
        terminals[id].term.focus();
        setTimeout(() => terminals[id].fitAddon.fit(), 50);
    }
}

function removeTerminal(event, id) {
    event.stopPropagation();
    document.getElementById(id)?.remove();
    document.getElementById('tab-' + id)?.remove();
    socket.emit('close-session', id);
    delete terminals[id];

    const remaining = document.querySelector('.terminal-container');
    if(remaining) {
        switchTerminal(remaining.id);
    } else {
        currentTerminalId = null;
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('main').classList.toggle('full');
    if(currentTerminalId && terminals[currentTerminalId]) {
        setTimeout(() => terminals[currentTerminalId].fitAddon.fit(), 260);
    }
}

// --- FILE MANAGER OPERATIONS (CRUD) ---
async function loadFiles() {
    try {
        const res = await fetch('/api/files');
        if (!res.ok) throw new Error("API Route unreachable");
        
        const files = await res.json();
        const fileList = document.getElementById('fileList');
        fileList.innerHTML = '';

        if(files.length === 0) {
            fileList.innerHTML = `<p class="text-xs text-gray-500 p-2">Workspace is empty. Create a file!</p>`;
            return;
        }

        files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-item group flex items-center justify-between';
            
            const isFolder = file.type === 'folder';
            const icon = isFolder ? 'fa-folder text-yellow-500' : 'fa-file text-blue-400';

            div.innerHTML = `
                <div class="flex items-center gap-3 w-full" onclick="${isFolder ? '' : `openFile('${file.name}')`}">
                    <i class="fa-solid ${icon} text-sm"></i>
                    <span class="text-sm truncate max-w-[150px] text-gray-200 group-hover:text-white">${file.name}</span>
                </div>
                <div class="flex gap-3 px-1">
                    ${!isFolder ? `<i class="fa-solid fa-pen-to-square text-gray-400 hover:text-white text-xs cursor-pointer" onclick="openFile('${file.name}')" title="Edit"></i>` : ''}
                    <i class="fa-solid fa-trash text-gray-400 hover:text-red-500 text-xs cursor-pointer" onclick="deleteFile('${file.name}')" title="Delete"></i>
                </div>
            `;
            fileList.appendChild(div);
        });
    } catch (err) {
        document.getElementById('fileList').innerHTML = `<p class="text-xs text-red-400 p-2">Error connecting to backend API</p>`;
        console.error("Files load karne me error aya:", err);
    }
}

function promptCreateFile() {
    const filename = prompt("Enter new file name with extension (e.g., system.js, note.txt):");
    if (!filename || filename.trim() === "") return;

    fetch('/api/files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: filename.trim(), content: '' })
    }).then(res => {
        if(res.ok) loadFiles();
        else alert("File create nahi ho saki!");
    });
}

async function openFile(filename) {
    const res = await fetch(`/api/files/${filename}`);
    if (res.ok) {
        const data = await res.json();
        document.getElementById('editingFileName').value = filename;
        document.getElementById('modalTitle').innerText = `Editing: ${filename}`;
        document.getElementById('fileEditor').value = data.content;
        document.getElementById('editModal').classList.add('active');
    }
}

function closeModal() {
    document.getElementById('editModal').classList.remove('active');
}

async function saveFileContent() {
    const filename = document.getElementById('editingFileName').value;
    const content = document.getElementById('fileEditor').value;

    const res = await fetch(`/api/files/${filename}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
    });

    if (res.ok) {
        closeModal();
        loadFiles();
    } else {
        alert("Changes save nahi ho paye!");
    }
}

function deleteFile(filename) {
    if (!confirm(`Kya aap "${filename}" ko hamesha ke liye delete karna chahte hain?`)) return;

    fetch(`/api/files/${filename}`, { method: 'DELETE' })
    .then(res => {
        if(res.ok) loadFiles();
        else alert("File delete nahi ho saki.");
    });
}

// Terminal window resize handler auto fit rules
window.addEventListener('resize', () => {
    if(currentTerminalId && terminals[currentTerminalId]) {
        terminals[currentTerminalId].fitAddon.fit();
    }
});

// Run commands on startup
setTimeout(() => {
    createTerminal();
    loadFiles();
}, 200);
</script>

</body>
</html>
