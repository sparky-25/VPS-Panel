<!DOCTYPE html>
        <div class="font-bold">VPS PANEL</div>
        <div class="text-xs text-gray-400">MDCloud Terminal</div>
    </div>
</div>

<div class="flex items-center gap-2">
    <button onclick="location.reload()"
        class="bg-white text-black px-4 py-2 rounded-xl font-semibold">
        Restart
    </button>
</div>

</div>

<div class="main">

<div class="sidebar glass">

<h2 class="font-bold text-lg mb-4">Files</h2>

<div class="space-y-2 text-sm">

<div class="file">📁 root</div>
<div class="file">📄 server.js</div>
<div class="file">📄 package.json</div>
<div class="file">📄 index.html</div>
<div class="file">📄 Dockerfile</div>

</div>

</div>

<div class="terminal-container">
    <div id="terminal"></div>
</div>

</div>

<script>
const socket = io();

const term = new Terminal({
    cursorBlink: true,
    theme: {
        background: '#000000',
        foreground: '#ffffff'
    },
    fontSize: 14
});

term.open(document.getElementById('terminal'));
term.focus();

term.write('Welcome to Ubuntu VPS\r\n');
term.write('Connected Successfully\r\n\r\n');

term.onData((data) => {
    socket.emit('input', data);
});

socket.on('output', (data) => {
    term.write(data);
});

window.addEventListener('resize', () => {
    socket.emit('resize', {
        cols: term.cols,
        rows: term.rows
    });
});
</script>

</body>
</html>
